name: Setup Python and uv
description: Install Python, uv, and locked dev dependencies from uv.lock

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          uv.lock

    - name: Setup uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.10.9"

    - name: Install dependencies from lock
      shell: bash
      run: |
        python -c "from pathlib import Path; Path('tmp').mkdir(exist_ok=True)"
        make uv-lock-check
        uv export --frozen --extra dev --format requirements-txt --no-hashes -o tmp/locked-requirements.ci.txt
        python -m pip install --upgrade pip
        python -m pip install -r tmp/locked-requirements.ci.txt
