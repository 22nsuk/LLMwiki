name: Supply Chain Attestation

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  attest-dist:
    name: build and attest distributions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9f0a00f75d806ba315099a0ee3373da5c9662c6e # v7.0.0

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"

      - name: Build distributions
        run: python -m build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Upload distribution packages
        uses: actions/upload-artifact@b7c566a90a339ca16dbbccd821e42c899fd1dcb0 # v7.0.0
        with:
          name: dist-packages
          path: dist/*
          if-no-files-found: error
