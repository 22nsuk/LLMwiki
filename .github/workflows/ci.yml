name: CI

on:
  push:
    branches-ignore:
      - "dependabot/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-tier:
    name: ${{ matrix.tier }} / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
        tier:
          - fast
          - report-contract
          - release-closeout-regression
          - release-sealing
          - subprocess
          - slow
          - integration
          - integration-heavy
          - public
        exclude:
          - tier: report-contract
            python-version: "3.13"
          - tier: report-contract
            python-version: "3.14"
          - tier: release-closeout-regression
            python-version: "3.13"
          - tier: release-closeout-regression
            python-version: "3.14"
          - tier: release-sealing
            python-version: "3.13"
          - tier: release-sealing
            python-version: "3.14"
          - tier: subprocess
            python-version: "3.13"
          - tier: subprocess
            python-version: "3.14"
          - tier: slow
            python-version: "3.13"
          - tier: slow
            python-version: "3.14"
          - tier: integration
            python-version: "3.13"
          - tier: integration
            python-version: "3.14"
          - tier: integration-heavy
            python-version: "3.13"
          - tier: integration-heavy
            python-version: "3.14"
          - tier: public
            python-version: "3.13"
          - tier: public
            python-version: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate package build
        if: matrix.tier == 'fast'
        run: python -m build

      - name: Run fast contract tier
        if: matrix.tier == 'fast'
        run: |
          make test-selectors-sync-check
          if [ -f system/system-index.md ] && [ -f wiki/index.md ] && [ -d raw ]; then
            make check-finalized
            make release-smoke-fast
          else
            make static
            make test-fast
          fi

      - name: Run report-contract tier
        if: matrix.tier == 'report-contract'
        run: make ci-report-contract-tier

      - name: Run release closeout regression tier
        id: release_closeout_regression
        if: matrix.tier == 'release-closeout-regression'
        run: |
          make release-workflow-order-guard
          make release-closeout-regression-dry-run
          make release-closeout-post-check-finalizer-ci-artifact
          make release-closeout-cost-evidence-ci-artifact

      - name: Run release authority diagnostics tier
        id: release_authority_diagnostics
        if: always() && matrix.tier == 'release-closeout-regression' && steps.release_closeout_regression.outcome != 'skipped'
        env:
          CI_PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          set +e
          finality_status=0
          sealed_preflight_status=0
          make release-closeout-finality-verify-ci-artifact
          finality_status=$?
          make release-authority-sealed-preflight
          sealed_preflight_status=$?
          if [ "$finality_status" -ne 0 ] || [ "$sealed_preflight_status" -ne 0 ]; then
            mkdir -p tmp
            {
              echo "release authority diagnostics did not complete cleanly for py${CI_PYTHON_VERSION}."
              echo "finality_status=${finality_status}"
              echo "sealed_preflight_status=${sealed_preflight_status}"
              echo "This diagnostic step is non-blocking in public CI; the regression tier step carries the job gate."
            } > "tmp/release-authority-blocked-preflight-upload-diagnostics-${CI_PYTHON_VERSION}.txt"
          fi
          exit 0

      - name: Materialize release closeout upload diagnostics
        if: always() && matrix.tier == 'release-closeout-regression' && (steps.release_closeout_regression.outcome != 'success' || steps.release_authority_diagnostics.outcome != 'success')
        shell: bash
        env:
          CI_PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          mkdir -p tmp
          {
            echo "release-closeout-regression did not complete successfully for py${CI_PYTHON_VERSION}."
            echo "The upload step is collecting this sentinel instead of failing on missing downstream files."
          } > "tmp/release-closeout-cost-evidence-upload-diagnostics-${CI_PYTHON_VERSION}.txt"
          {
            echo "release-closeout-regression did not complete successfully for py${CI_PYTHON_VERSION}."
            echo "The authority preflight upload is collecting this sentinel instead of failing on missing downstream files."
          } > "tmp/release-authority-blocked-preflight-upload-diagnostics-${CI_PYTHON_VERSION}.txt"

      - name: Upload release closeout cost evidence
        if: always() && matrix.tier == 'release-closeout-regression'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-closeout-cost-evidence-${{ matrix.python-version }}
          path: |
            tmp/release-closeout-fixed-point-cost-trend-ci.json
            ops/reports/release-closeout-fixed-point.json
            ops/reports/release-closeout-fixed-point-cost-trend.json
            ops/reports/release-evidence-dashboard.json
            ops/reports/release-workflow-order-guard.json
            tmp/release-closeout-post-check-finalizer.json
            tmp/release-closeout-post-check-finalizer-recommended-targets.txt
            tmp/release-closeout-post-check-finalizer-plan.json
            tmp/release-closeout-cost-evidence-upload-diagnostics-${{ matrix.python-version }}.txt
          if-no-files-found: error

      - name: Upload release authority blocked preflight
        if: always() && matrix.tier == 'release-closeout-regression'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-authority-blocked-preflight-${{ matrix.python-version }}
          path: |
            build/release/release-closeout-sealed-dry-run/LLMwiki-source.zip
            build/release/release-closeout-sealed-dry-run/release-closeout-batch-manifest.json
            build/release/release-closeout-sealed-dry-run/external-report-reference-manifest.json
            build/release/release-closeout-sealed-dry-run/release-closeout-sealed-rehearsal-check.json
            ops/reports/release-closeout-sealed-rehearsal-check.json
            tmp/release-closeout-finality-verify-ci.json
            tmp/release-authority-blocked-preflight-upload-diagnostics-${{ matrix.python-version }}.txt
          if-no-files-found: error

      - name: Run release-sealing tier
        if: matrix.tier == 'release-sealing'
        run: |
          make test-release-sealing-all
          make -n release-run-ready
          make -n release-sealed-run-ready
          make -n release-auto-promotion-ready

      - name: Run subprocess tier
        if: matrix.tier == 'subprocess'
        run: make test-subprocess

      - name: Run slow test tier
        if: matrix.tier == 'slow'
        run: make test-slow

      - name: Run integration test tier
        if: matrix.tier == 'integration'
        run: |
          make test-integration
          if [ -f system/system-index.md ] && [ -f wiki/index.md ] && [ -d raw ]; then
            make release-smoke
          fi

      - name: Run integration-heavy test tier
        if: matrix.tier == 'integration-heavy'
        run: make test-integration-heavy

      - name: Run public mirror tier
        if: matrix.tier == 'public'
        run: make ci-public-tier

      - name: Upload public check summary diagnostics
        if: always() && matrix.tier == 'public'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-check-summary-${{ matrix.python-version }}
          path: |
            tmp/public-check-summary.candidate.json
            tmp/public-check-summary-check.json
          if-no-files-found: warn

  windows-release-smoke:
    name: windows-release-smoke / py3.12
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"

      - name: Run Windows release smoke
        run: python -m ops.scripts.release.release_smoke --vault . --profile full --out ops/reports/release-smoke-report-windows.json

      - name: Run Windows command runtime smoke
        run: python -m pytest -q tests/test_command_runtime.py

      - name: Run Windows strict preview smoke
        run: |
          python .\tools\strict_preview_audit.py --vault . --out tmp\strict-preview-audit-windows.json --targets "ops/scripts tests tools" --ruff-select PTH201 --mypy-flags "--check-untyped-defs --disallow-untyped-defs --disallow-incomplete-defs" --python python

      - name: Run Windows schema static smoke tests
        run: make test-schema-static-smoke PYTHON=python

      - name: Upload Windows smoke artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-release-smoke-report
          path: ops/reports/release-smoke-report-windows.json
          if-no-files-found: error

  raw-registry-cross-environment:
    name: raw-registry-cross-env / ${{ matrix.profile }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: linux-c-utf8
          - os: windows-latest
            profile: windows-utf8
          - os: macos-latest
            profile: macos-utf8

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"

      - name: Generate raw registry cross-environment matrix
        shell: bash
        run: |
          python -m ops.scripts.registry.raw_registry_cross_environment_matrix \
            --vault . \
            --profile "${{ matrix.profile }}" \
            --out "ops/reports/raw-registry-cross-environment-matrix-${{ matrix.profile }}.json"

      - name: Upload raw registry cross-environment matrix
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: raw-registry-cross-environment-${{ matrix.profile }}
          path: ops/reports/raw-registry-cross-environment-matrix-${{ matrix.profile }}.json
          if-no-files-found: error

  raw-registry-cross-environment-evidence:
    name: raw-registry-cross-env evidence bundle / py3.12
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: raw-registry-cross-environment
    if: always()
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"

      - name: Download raw registry cross-environment matrices
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: raw-registry-cross-environment-*
          path: ops/reports
          merge-multiple: true

      - name: Generate raw registry cross-environment evidence bundle
        id: raw_registry_cross_environment_evidence_bundle
        run: |
          python -m ops.scripts.registry.raw_registry_cross_environment_evidence_bundle \
            --vault . \
            --reports-dir ops/reports \
            --out ops/reports/raw-registry-cross-environment-evidence-bundle.json

      - name: Materialize raw registry evidence upload diagnostics
        if: always() && steps.raw_registry_cross_environment_evidence_bundle.outcome != 'success'
        shell: bash
        run: |
          mkdir -p tmp
          {
            echo "raw-registry cross-environment evidence bundle generation did not complete successfully."
            echo "The upload step is collecting this sentinel instead of failing on a missing bundle file."
          } > tmp/raw-registry-cross-environment-evidence-bundle-upload-diagnostics.txt

      - name: Upload raw registry cross-environment evidence bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: raw-registry-cross-environment-evidence-bundle
          path: |
            ops/reports/raw-registry-cross-environment-evidence-bundle.json
            tmp/raw-registry-cross-environment-evidence-bundle-upload-diagnostics.txt
          if-no-files-found: error

  supply-chain-gate:
    name: supply-chain / py3.12
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"

      - name: Run supply-chain gate
        run: make supply-chain-check

      - name: Run SBOM readiness gate
        run: make sbom-readiness-check

      - name: Generate CycloneDX and OpenVEX draft artifacts
        run: make openvex-draft-cached

      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supply-chain-reports
          path: |
            ops/reports/supply-chain-provenance.json
            ops/reports/supply-chain-gate-report.json
            ops/reports/security-advisories.json
            ops/reports/sbom-export-mapping.json
            ops/reports/sbom-readiness-gate-report.json
            ops/reports/supply-chain-artifact-model.json
            ops/reports/cyclonedx-bom.json
            ops/reports/spdx-sbom.json
            ops/reports/openvex-draft.json
            ops/reports/in-toto-statement.json
            ops/reports/sigstore-bundle-verification.json
          if-no-files-found: error
