mutation_policy:
  one_mechanism_per_experiment: true
  default_requires_eval_improvement: true
  prefer_structure_over_prompt_only: true
  require_log_entry: true

equal_score_promotion:
  allowed_artifact_classes:
    - system_mechanism
  require_secondary_non_regression: true
  require_any_secondary_improvement: true
  nonempty_line_growth_budget_per_added_test_case: 20
  secondary_axes:
    - lint
    - complexity
    - tests

behavior_delta:
  required_for_system_mechanism: false
  required_for_auto_improve: true
  required_for_equal_score_promotion: true

complexity_policy:
  dimensions:
    change_surface:
      weight: 20
      scale: 0-5
      description: primary/supporting target count, per-target capped volume, AST semantic complexity를 결합한 수정 범위
    dependency_impact:
      weight: 20
      scale: 0-5
      description: schema/policy/interface surface와 repo contract 경계 영향
    verification_cost:
      weight: 20
      scale: 0-5
      description: focused test file 수, test case density, contract/risk surface 기준의 검증 비용
    artifact_heterogeneity:
      weight: 15
      scale: 0-5
      description: code/doc/policy/schema/json 등 산출물 혼합 정도
    environment_risk:
      weight: 25
      scale: 0-5
      description: high-risk flag 존재와 조합에 따른 실행 환경 위험도
  scoring:
    formula: complexity_score = round(sum(weight_i * dimension_i) / 5)
    output_range: 0-100
    notes:
      - weight 합계는 100이어야 한다.
      - complexity score는 signoff 설명력과 review surface를 위한 지표이며 equal-score hard gate는 structural metrics로 판정한다.
      - change_surface 산정은 coarse target의 전체 파일 크기 편향을 완화하기 위해 per-target cap과 semantic complexity evidence를 함께 기록한다.
      - verification_cost 산정은 테스트 파일 수만 보지 않고 test case density와 contract/risk surface를 함께 반영한다.
  risk_overrides:
    high_risk_flags:
      - schema_change
      - dependency_change
      - migration
      - security_surface
      - destructive_command
      - policy_surface
      - log_append_surface
    notes:
      - high-risk flag는 equal-score path를 자동 차단하지 않는다.
      - signoff rationale에는 lint/complexity/tests secondary axis 근거를 함께 남긴다.

subagent_routing_policy:
  enabled: true
  ladder:
    - rung: 1
      model: gpt-5.5
      reasoning_effort: medium
    - rung: 2
      model: gpt-5.5
      reasoning_effort: high
    - rung: 3
      model: gpt-5.5
      reasoning_effort: xhigh
  score_bands:
    low:
      max_score: 24
    moderate:
      max_score: 44
    high:
      max_score: 64
    extreme:
      max_score: 100
  roles:
    explorer:
      sandbox_mode: read-only
      default_rung: 1
      allowed_rungs:
        - 1
        - 2
      score_band_rungs:
        low: 1
        moderate: 1
        high: 2
        extreme: 2
      pressure_overrides:
        dependency_impact:
          threshold: 4
          min_rung: 2
        environment_risk:
          threshold: 3
          min_rung: 2
        artifact_heterogeneity:
          threshold: 3
          min_rung: 2
    owner-boundary-mapper:
      sandbox_mode: read-only
      default_rung: 1
      allowed_rungs:
        - 1
        - 2
      score_band_rungs:
        low: 1
        moderate: 1
        high: 2
        extreme: 2
      pressure_overrides:
        dependency_impact:
          threshold: 4
          min_rung: 2
        environment_risk:
          threshold: 3
          min_rung: 2
        artifact_heterogeneity:
          threshold: 3
          min_rung: 2
    worker:
