            kind: heading_unique_wikilinks
            heading: News / market / geopolitics
            heading_level: 3
        - label: coffee science sources
          source:
            kind: heading_unique_wikilinks
            heading: Coffee science / sensory / brewing
            heading_level: 3
        - label: query artifacts
          source:
            kind: section_unique_wikilinks
            section: Queries
        - label: domain syntheses
          source:
            kind: section_unique_wikilinks
            section: Syntheses
        - label: canonical concepts
          source:
            kind: section_unique_wikilinks
