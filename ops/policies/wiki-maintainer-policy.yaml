raw_markdown_normalization_contract:
  mutable_extensions:
    - .md
  immutable_raw_extensions:
    - .pdf
  required_metadata:
    - title
    - source
    - published
    - created
  optional_metadata:
    - author
    - description
    - tags
  allow_unknown:
    - published
    - created
  disallow_unknown:
    - title
    - source
  metadata_priority:
    title:
      - frontmatter.title
      - transport_header.title
      - first_h1
      - filename_humanized
    source:
      - frontmatter.source
      - transport_header.url_source
      - capture_url_line
      - first_absolute_url
    published:
      - frontmatter.published
      - transport_header.published_time
      - body_last_updated
      - source_url_date
      - unknown
    created:
      - frontmatter.created
      - capture_date_line
      - unknown
  removable_noise_classes:
    transport_headers:
      - "Title:"
      - "URL Source:"
      - "Published Time:"
      - "Number of Pages:"
      - "Markdown Content:"
    cookie_markers:
      - cookiebot
      - This website uses cookies
      - Consent Selection
      - "[#GPC_"
      - "[[#IABV2SETTINGS#]]"
      - "[#IABV2_"
      - Cookie declaration last updated
    blob_prefixes:
      - blob:http://localhost
  manual_review_markers:
    - replacement_char
  prohibited_mutations:
    - semantic_body_rewrite
    - summary_addition
    - translation_or_paraphrase
    - evidence_line_deletion
    - guessed_mojibake_repair
    - untracked_file_rename
  report_fields:
    - pre_sha256
    - post_sha256
    - metadata
    - removed_noise_classes
    - manual_review_required
    - manual_review_reasons

readiness_gate:
  min_related_links: 2
  min_source_trace_items: 1
  max_high_severity_open_questions: 0
  max_medium_severity_open_questions: 3
  allow_warn_for_medium_question_overflow: true

stage2_eval:
  source_count_consistency_enabled: true
  central_research_anchor_enabled: true
  broad_synthesis_boundary_enabled: true
  seed_source_absorption_enabled: true

eval_coverage_review:
  cohorts:
    - cohort_id: stage1_source_substance_coverage
      stage: stage1
      path_prefixes:
        - wiki/source--
        - system/source--
      coverage_rules:
        - source_page_substance
      min_matching_pages: 1
      require_nonzero_covered_pages: true
      suggested_action: review_stage1_source_eval_surface
    - cohort_id: stage1_synthesis_decisionability_coverage
      stage: stage1
      path_prefixes:
        - wiki/synthesis--
        - system/synthesis--
      coverage_rules:
        - decisionability
      min_matching_pages: 1
      require_nonzero_covered_pages: true
      suggested_action: review_stage1_synthesis_eval_surface
    - cohort_id: stage1_query_decisionability_coverage
      stage: stage1
      path_prefixes:
        - wiki/query--
        - system/query--
      coverage_rules:
        - decisionability
      min_matching_pages: 1
      require_nonzero_covered_pages: true
      suggested_action: review_stage1_query_eval_surface
    - cohort_id: stage2_synthesis_source_count_coverage
      stage: stage2
      path_prefixes:
        - wiki/synthesis--
        - system/synthesis--
      coverage_rules:
        - declared_source_count_matches_evidence
      min_matching_pages: 1
      require_nonzero_covered_pages: true
      suggested_action: review_stage2_synthesis_source_count_eval_surface
    - cohort_id: stage2_research_anchor_source_coverage
      stage: stage2
      path_prefixes:
        - wiki/source--
      frontmatter_equals:
        source_type: domain-research-paper
      coverage_rules:
        - central_research_source_has_anchor_layer
      min_matching_pages: 1
      require_nonzero_covered_pages: false
      suggested_action: review_stage2_research_anchor_eval_surface
    - cohort_id: stage2_seed_source_absorption_coverage
      stage: stage2
      path_prefixes:
        - wiki/source--
      frontmatter_not_equals:
        source_type: domain-research-paper
      coverage_rules:
        - seed_source_has_absorption_hint
      min_matching_pages: 1
      require_nonzero_covered_pages: false
      suggested_action: review_stage2_seed_source_eval_surface
    - cohort_id: stage2_broad_synthesis_boundary_coverage
      stage: stage2
      path_prefixes:
        - wiki/synthesis--
      coverage_rules:
        - broad_synthesis_has_boundary_sections
      min_matching_pages: 1
      require_nonzero_covered_pages: false
      suggested_action: review_stage2_broad_synthesis_eval_surface

