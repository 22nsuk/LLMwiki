promotion_policy:
  decision_values:
    - PROMOTE
    - HOLD
    - DISCARD
  artifact_classes:
    wiki_source:
      kind: page
      root: wiki
      prefixes:
        - source--
    wiki_concept:
      kind: page
      root: wiki
      prefixes:
        - concept--
    wiki_synthesis:
      kind: page
      root: wiki
      prefixes:
        - synthesis--
    wiki_query:
      kind: page
      root: wiki
      prefixes:
        - query--
    system_page:
      kind: page
      root: system
      prefixes:
        - source--
        - concept--
        - synthesis--
        - query--
        - lint--
    system_mechanism:
      kind: mechanism
      allowed_targets:
        - ops/
        - AGENTS.md
        - README.md
        - Makefile
        - system/system-index.md
        - system/system-raw-registry.md
        - system/system-log.md
  signoff_defaults:
    wiki_source: not_required
    wiki_concept: not_required
    wiki_synthesis: not_required
    wiki_query: not_required
    system_page: not_required
    system_mechanism: not_required
  log_defaults:
    page: system/system-log.md
    status_values:
      - pending
      - recorded
      - not_required
  decision_rules:
    page_class:
      discard_on_repo_lint_fail: true
      discard_on_primary_page_eval_not_max: true
      hold_on_required_signoff_pending: true
      discard_on_signoff_rejected: true
    system_mechanism:
      require_baseline_candidate_reports: true
      require_run_ledger: true
      discard_on_candidate_lint_not_pass: true
      discard_on_candidate_eval_not_pass: true
      hold_on_signoff_pending: false
      promote_only_if_signoff_approved: false
  rule_registry:
    page_class:
      - primary_target_scope
      - primary_target_exists
      - repo_lint_status
      - current_policy_consistency
      - primary_target_eval_full_pass
      - primary_target_stage2_full_pass
      - signoff_status
    system_mechanism:
      - primary_target_scope
      - primary_target_exists
      - report_consistency
      - run_ledger_target_coverage
      - mechanism_report_primary_targets
      - changed_files_manifest_declared_targets
      - changed_files_manifest_scope
      - changed_files_manifest_allowed_apply_roots
      - changed_files_manifest_nonempty
      - changed_files_manifest_primary_targets_touched
      - behavior_delta_presence
      - candidate_lint_pass
      - candidate_eval_pass
      - eval_score_improves
      - lint_non_regression
      - lint_improves
      - structural_complexity_non_regression
      - structural_complexity_improves
      - tests_non_regression
      - tests_increase
      - complexity_profile_score
      - risk_flags
      - equal_score_secondary_eligibility
      - signoff_status
  rule_metadata:
    page_class:
      primary_target_scope:
        artifact_dependencies: []
        reducer: status_fail_discard
        severity: blocker
        summary_template: "Page primary target scope gate emitted {statuses}: {details}"
      primary_target_exists:
        artifact_dependencies: []
        reducer: status_fail_discard
        severity: blocker
        summary_template: "Page primary target existence gate emitted {statuses}: {details}"
      repo_lint_status:
        artifact_dependencies:
          - current_lint
        reducer: page_repo_lint_status
        severity: blocker
        summary_template: "Page repo lint gate emitted {statuses}: {details}"
      current_policy_consistency:
        artifact_dependencies:
          - current_lint
          - current_eval
          - current_stage2
          - policy
        reducer: status_fail_discard
        severity: blocker
        summary_template: "Page current-policy consistency gate emitted {statuses}: {details}"
      primary_target_eval_full_pass:
        artifact_dependencies:
          - current_eval
        reducer: page_primary_eval_status
        severity: blocker
        summary_template: "Page primary eval full-pass gate emitted {statuses}: {details}"
      primary_target_stage2_full_pass:
        artifact_dependencies:
          - current_stage2
        reducer: status_fail_discard
        severity: blocker
        summary_template: "Page primary Stage 2 full-pass gate emitted {statuses}: {details}"
      signoff_status:
        artifact_dependencies:
          - signoff
        reducer: page_signoff_status
        severity: blocker
        summary_template: "Page signoff status gate emitted {statuses}: {details}"
    system_mechanism:
