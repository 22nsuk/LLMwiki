    - page: system/system-raw-registry.md
      summary_section: Summary
      metrics:
        - label: total registered paths
          source:
            kind: registry_entry_count
        - label: system corpus entries
          source:
            kind: registry_entry_count
            filters:
              corpus: system
        - label: wiki corpus entries
          source:
            kind: registry_entry_count
            filters:
              corpus: wiki
        - label: ingested
          source:
            kind: registry_entry_count
            filters:
              status: ingested
        - label: registered-not-ingested
          source:
            kind: registry_entry_count
            filters:
              status: registered-not-ingested

