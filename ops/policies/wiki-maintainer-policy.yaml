auto_improve_policy:
  enabled: true
  artifact_class: system_mechanism
  session_reports_dir: ops/reports/auto-improve-sessions
  allowed_executors:
    - codex_exec
  defaults:
    max_proposals: 3
    max_minutes: 90
    max_consecutive_failures: 2
    executor: codex_exec
    executor_timeout_seconds: 1800
    wrapper_command_timeout_seconds: 5400
  queue:
    require_unblocked: true
    refresh_after_each_run: true
    ordering: priority_desc_proposal_id_asc
  allowed_apply_roots:
    - ops/
    - tests/
    - system/system-log.md
  apply_mode: live
  workspace_preparation:
    mode: full_copy
    declared_dependencies:
      - .codex/agents/
      - .github/
      - AGENTS.md
      - ARCHITECTURE.md
      - CHANGELOG.md
      - CONTRIBUTING.md
      - LICENSE
      - Makefile
      - README.md
      - SECURITY.md
      - THIRD_PARTY_NOTICES.md
      - docs/
      - pyproject.toml
      - pytest.ini
      - requirements-dev.txt
      - requirements.txt
      - tools/
      - uv.lock
  scope_resolution:
    fail_closed_on_missing_tests: true
    test_file_overrides: {}
    test_path_globs:
      - tests/test_{stem}*.py
      - tests/test_{target_stem}*.py
    reviewer_target_prefixes:
      - ops/policies/
      - ops/schemas/
      - system/
    reviewer_score_bands:
      - high
      - extreme
    risk_flag_overrides:
      ops/policies/: policy_surface
      ops/schemas/: schema_change
      system/system-log.md: log_append_surface
    auditor_role_map:
      schema_change:
        - provenance-auditor
      dependency_change:
        - parity-replay-auditor
      migration:
        - parity-replay-auditor
      security_surface:
        - provenance-auditor
      destructive_command:
        - parity-replay-auditor
      policy_surface:
        - valuation-policy-auditor
      log_append_surface:
        - provenance-auditor
  dispatch:
    always_roles:
      - worker
      - validator
  quarantine:
    pre_promotion_failure_outcomes:
      - mutation_failed
      - review_blocked
      - validation_blocked
      - repo_health_blocked

mechanism_review:
  enabled: true
  max_runs: 20
  max_candidates: 10
  run_history:
    canonical_source: runs/<run-id>/promotion-report.json#history
    active_statuses:
      - active
    excluded_statuses:
      - archived
      - quarantined
    buggy_run_default_action: set_history_status
    physical_move_default: false
    notes:
      - buggy run을 active review history에서 제외할 때는 directory move보다 `set_mechanism_run_history`를 먼저 사용한다.
      - physical relocation이 필요하더라도 archive/quarantine status를 먼저 기록하고 audit trail을 유지한다.
  families:
    self_mod_stability:
      tier: core
      objective: iterative self-modification degradation and structural erosion
      metrics:
        - verbosity_growth
        - repeat_fail_cluster_rate
        - branch_growth_without_test_growth
        - high_complexity_low_test_pressure
    schema_drift:
      tier: core
      objective: detect schema-touching promotions that are not paired with test guardrails
      metrics:
        - schema_change_without_test_growth
        - promoted_schema_change_without_guardrails
    policy_complexity_growth:
      tier: supporting
      objective: detect policy-surface growth that increases mechanism complexity without improving eval outcomes
      metrics:
        - policy_surface_growth_without_eval_gain
        - policy_complexity_score_growth
        - policy_nonempty_growth
    contract_regression_signals:
      tier: supporting
      objective: detect repeated non-improvement against current contract-eval surfaces
      metrics:
        - stage1_same_eval_rate
        - repeated_discard_runs
  candidate_types:
    - mechanism_branch_growth_without_test_growth_candidate
    - mechanism_high_complexity_low_test_pressure_candidate
    - mechanism_schema_drift_candidate
    - mechanism_policy_complexity_growth_candidate
    - mechanism_eval_stagnation_candidate
  calibration:
    enabled: true
    lookback_runs: 6
    unstable_followup_window: 2
    priority_adjustments:
      promoted_then_regressed: 15
      repeated_same_eval_after_promote: 10
      durable_promote: -10
    session_priority_adjustments:
      positive_cap: 12
      negative_cap: 12
      by_family:
        self_mod_stability:
          validation_blocked: 0
          review_blocked: 0
          mutation_failed: -5
          validator_dispatch: 0
          reviewer_dispatch: 0
          high_risk_routing: -3
        schema_drift:
          validation_blocked: 6
          review_blocked: 4
          mutation_failed: 0
          validator_dispatch: 2
          reviewer_dispatch: 0
          high_risk_routing: 0
        policy_complexity_growth:
          validation_blocked: 0
          review_blocked: 0
          mutation_failed: -4
          validator_dispatch: 0
          reviewer_dispatch: 0
          high_risk_routing: -4
        contract_regression_signals:
          validation_blocked: 5
          review_blocked: 4
          mutation_failed: 0
          validator_dispatch: 2
          reviewer_dispatch: 1
          high_risk_routing: 0
    outcome_metrics_preview:
      enabled: true
      mode: audit_only
      source_report: ops/reports/outcome-metrics.json
      recent_window: 20
      high_rework_count: 1
      hold_or_discard_moving_average: 0.25
      rollback_signal_ratio: 0.2
      defect_escape_pair_count: 1
      min_attempts_considered: 10
      min_target_attempts: 2
      shadow_priority_max_delta: 10
      notes:
        - outcome metrics preview is diagnostic only and does not change mechanism review priority.
        - priority_delta wiring requires a later explicit policy step after the preview signal stabilizes.
  thresholds:
    branch_growth_min_delta: 1
    repeated_branch_growth_runs: 2
    test_growth_min_delta: 1
    repeated_schema_drift_runs: 2
    repeated_policy_growth_runs: 2
    policy_nonempty_growth_min_delta: 8
    policy_complexity_score_growth_min_delta: 5
    complexity_score_high: 80
    branch_count_high: 25
    low_test_case_count: 5
    stagnation_window: 5
    repeated_same_eval_runs: 3
    repeated_discard_runs: 2

mutation_proposal:
  enabled: true
  max_proposals: 10
  lookback_runs: 5
  dedupe_window: 5
  recent_log_overlap_max_age_days: 7
  run_history_input:
