frontmatter_contract:
  common_required:
    - title
    - page_type
    - corpus
    - aliases
    - tags
  common_type_checks:
    title: string
    page_type: string
    corpus: string
    aliases: string_array
    tags: string_array
  optional_type_checks:
    artifact_contract_version: integer
    frontmatter_contract_version: integer
    registry_id: string
    raw_path: string
    source_type: string
    research_mode: string
    domain: string
    created: string
    updated: string
    canonical: boolean
    source_count: integer
    question_scope: string
    maintenance_scope: string
    special_role: string
  corpus_by_root:
    wiki: wiki
    system: system
  metadata_review:
    require_alias_stem: true
    required_tag_templates:
      - corpus/{corpus}
      - type/{page_type}
      - research/{research_mode}
    source_page_slug:
      ascii_summary_slug_pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      disallowed_slug_substrings:
        - "intake-w-"
    source_registry_required_alignment:
      registry_id: registry_id
      raw_path: storage_path
      source_type: type
    source_registry_optional_alignment:
      domain: domain
  conditional_rules:
    source_type:
      domain-research-paper:
        required:
          - research_mode
        allowed_values:
          research_mode:
            - experiment
            - model
            - reference
  special_pages:
    wiki/index.md:
      required:
        - special_role
      expected:
        page_type: index
        corpus: wiki
        special_role: router
