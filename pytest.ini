[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --capture=sys
# >>> pytest-marker-registry >>>
markers =
    slow: Expensive deterministic runtime tests excluded from the default fast lane.
    integration: End-to-end or live-runtime contract tests in the standard integration tier.
    integration_heavy: Heavier live generation tests that run separately and are not implied by plain integration.
    public: Public-surface contract tests for root-tree and exported-tree checks.
    report_contract: Report, schema, template, and generated artifact contract tests.
    release_sealing: Release-builder sealing, batch manifest, and final artifact immutability checks.
    subprocess: Tests that exercise real subprocess, interpreter startup, timeout, or OS command behavior.
    fast_smoke: Curated developer precheck slice for fast feedback.
    default_test_boundary: Curated public/report_contract boundary checks chained into make test so script placement, lifecycle classification, and selector-registry drift fail before the full public lane.
    runtime_hotspot_smoke: Focused runtime hotspot façade decomposition check for batch feedback before broader fast-lane replay.
    report_contract_core: Targeted core verification slice for report-contract summary evidence.
    release_closeout_regression: Focused release closeout regression pack used by CI and finalizer diagnostics.
    release_sealing_core: Concrete selector set for the release-sealing lane.
    schema_static_smoke: Schema and static-gate smoke slice for Windows CI and local precheck.
# <<< pytest-marker-registry <<<
